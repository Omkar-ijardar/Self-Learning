<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click and Double Click Event</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
$(document).ready(function(){

    $("*").click(function(){
        alert("Element clicked: " + this.tagName);
    });
    $("*").dblclick(function(){
        alert("Element double-clicked: " + this.tagName);
    });

});
</script>

</head>

<body>

<h1>Heading</h1>
<p>This is a paragraph.</p>
<button>Click Button</button>

</body>
</html>
